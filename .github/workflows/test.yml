name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Use Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Use Rust cache
        uses: Swatinem/rust-cache@v2
      
      - name: Run lint
        run: cargo clippy --all-targets
      
      - name: Run unit tests
        run: cargo test --all-targets --verbose
